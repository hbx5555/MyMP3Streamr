<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyMP3Streamr Uploader Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>MyMP3Streamr Uploader Settings</h1>
      <p>These settings are stored only in Chrome extension storage on this browser profile.</p>

      <form id="settingsForm">
        <label>
          Railway server URL
          <input id="serverUrl" type="url" placeholder="https://mymp3streamr-production.up.railway.app" required />
        </label>
        <label>
          Admin API Key
          <input id="adminApiKey" type="password" autocomplete="off" required />
        </label>
        <button type="submit">Save settings</button>
        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </main>
    <script src="options.js"></script>
  </body>
</html>
